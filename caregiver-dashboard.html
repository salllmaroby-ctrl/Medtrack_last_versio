<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم مقدم الرعاية - النظام الطبي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 flex h-screen overflow-hidden">

    <div class="w-72 bg-[#0b0f19] flex flex-col justify-between p-6 z-10 text-white">
        <div>
            <div class="flex items-center justify-between bg-[#111827] border border-slate-800 rounded-2xl p-4 mb-8">
                <div class="flex items-center gap-3">
                    <span class="p-2 bg-purple-900/50 text-purple-400 rounded-xl text-xl">🩺</span>
                    <div>
                        <p class="text-xs text-slate-500 font-medium">مرحباً بك</p>
                        <h1 id="caregiver-name" class="text-sm font-bold text-slate-200">جاري التحميل...</h1>
                    </div>
                </div>
            </div>

            <nav class="space-y-2">
                <button id="tab-patients" class="flex items-center justify-between px-4 py-3 bg-purple-600 text-white font-semibold rounded-xl transition w-full text-right">
                    <span class="flex items-center gap-3"><span>👥</span> قائمة المرضى</span>
                </button>
                
                <button id="tab-alerts" class="flex items-center justify-between px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition w-full text-right">
                    <span class="flex items-center gap-3"><span>🚨</span> التنبيهات والتحذيرات</span>
                </button>
            </nav>
        </div>
        
        <button id="logout-btn" class="flex items-center gap-3 px-4 py-3 text-red-400 hover:bg-red-950/30 rounded-xl transition w-full text-right font-semibold">
            <span>🚪</span> خروج
        </button>
    </div>

    <div class="flex-1 flex flex-col overflow-y-auto p-8">
        
        <div class="flex items-center gap-4 mb-8 border-b border-slate-100 pb-6">
            <span class="text-3xl p-3 bg-blue-50 text-blue-600 rounded-2xl">🩺</span>
            <div>
                <h2 class="text-2xl font-bold text-slate-800">لوحة المتابعة الطبية</h2>
                <p class="text-sm text-slate-400 mt-1">مراقبة التزام وحالة المرضى الخاضعين لإشرافك مباشرة</p>
            </div>
        </div>

        <div id="section-patients" class="space-y-6">
            <div class="flex items-center gap-2 mb-4">
                <span class="text-purple-600 text-xl">👥</span>
                <h3 class="font-bold text-lg text-slate-800">الحالات النشطة</h3>
            </div>
            
            <div id="patients-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="text-slate-400 col-span-2 text-center py-12">
                    جاري سحب قائمة المرضى النشطين وحساب نسب الالتزام حياً...
                </div>
            </div>
        </div>

        <div id="section-alerts" class="hidden space-y-4">
            <div class="flex items-center gap-2 mb-4">
                <span class="text-red-500 text-xl">🚨</span>
                <h3 class="font-bold text-lg text-slate-800">الحالات الحرجة (نسبة التزام أقل من 70%)</h3>
            </div>
            <div id="live-alerts-container" class="space-y-4">
                </div>
        </div>

    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { collection, onSnapshot, doc, getDoc, addDoc, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // مخازن مؤقتة لدمج بيانات المرضى والأدوية حياً
        let globalPatients = [];
        let globalMedications = [];
        let currentCaregiverId = null;

        // 1. التحقق من حالة تسجيل الدخول لمقدم الرعاية
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'index.html'; 
            } else {
                currentCaregiverId = user.uid;
                try {
                    const docRef = doc(db, "users", user.uid);
                    const docSnap = await getDoc(docRef);
                    if (docSnap.exists() && docSnap.data().name) {
                        document.getElementById('caregiver-name').innerText = docSnap.data().name;
                    } else {
                        document.getElementById('caregiver-name').innerText = user.email.split('@')[0];
                    }
                } catch (error) {
                    document.getElementById('caregiver-name').innerText = "مقدم الرعاية";
                }

                // بدء المراقبة الثنائية (المرضى + الأدوية)
                startLiveTracking();
            }
        });

        // 2. تفعيل المراقبة اللحظية المشتركة
        function startLiveTracking() {
            // أ) مراقبة المرضى التابعين لهذا الـ Caregiver فقط
            const patientsQuery = query(
                collection(db, "users"), 
                where("role", "==", "patient"),
                where("caregiverId", "==", currentCaregiverId)
            );

            onSnapshot(patientsQuery, (snapshot) => {
                globalPatients = [];
                snapshot.forEach((docSnap) => {
                    globalPatients.push({ id: docSnap.id, ...docSnap.data() });
                });
                calculateAndRender();
            });

            // ب) مراقبة الأدوية بالكامل لتحديث نسب الالتزام فوراً عند تغيير المريض لحالة الدواء
            onSnapshot(collection(db, "medications"), (snapshot) => {
                globalMedications = [];
                snapshot.forEach((docSnap) => {
                    globalMedications.push({ id: docSnap.id, ...docSnap.data() });
                });
                calculateAndRender();
            });
        }

        // 3. الدالة الحسابية الأساسية لتحديث الواجهة والنسب والتنبيهات
        function calculateAndRender() {
            const patientsGrid = document.getElementById('patients-grid');
            const alertsContainer = document.getElementById('live-alerts-container');
            
            if (!patientsGrid) return;
            patientsGrid.innerHTML = "";
            if (alertsContainer) alertsContainer.innerHTML = "";

            let criticalCount = 0;

            if (globalPatients.length === 0) {
                patientsGrid.innerHTML = `<div class="text-slate-400 col-span-2 text-center py-12">لا يوجد مرضى مسجلين تحت إشرافك حالياً.</div>`;
                if (alertsContainer) alertsContainer.innerHTML = `<div class="text-slate-400 py-6 text-center">لا توجد تحذيرات حالية.</div>`;
                return;
            }

            globalPatients.forEach((patient) => {
                // تصفية أدوية هذا المريض بالتحديد
                const patientMeds = globalMedications.filter(med => med.patientId === patient.id);
                const totalMeds = patientMeds.length;
                const completedMeds = patientMeds.filter(med => med.status === "completed").length;

                // حساب النسبة المئوية للالتزام (إذا لم يكن لديه أدوية تعتبر النسبة 100% افتراضياً)
                const adherencePercentage = totalMeds === 0 ? 100 : Math.round((completedMeds / totalMeds) * 100);

                // تحديد التصميم والشارات بناءً على نسبة الالتزام (أقل من 70% يعتبر غير منضبط)
                let statusBadge = `<span class="px-3 py-1 bg-green-50 text-green-600 text-xs font-bold rounded-full">✓ ملتزم بالنظام</span>`;
                let progressColor = "bg-purple-600";
                let cardBorder = "border-slate-100";

                if (adherencePercentage < 70) {
                    statusBadge = `<span class="px-3 py-1 bg-red-50 text-red-600 text-xs font-bold rounded-full animate-pulse">⚠️ غير ملتزم</span>`;
                    progressColor = "bg-red-500 animate-pulse";
                    cardBorder = "border-red-200 bg-red-50/10";
                    criticalCount++;

                    // إضافة كارت تحذيري في قسم التنبيهات
                    if (alertsContainer) {
                        const alertItem = document.createElement('div');
                        alertItem.className = "bg-red-50 border border-red-100 rounded-2xl p-4 flex items-center justify-between shadow-sm border-r-4 border-r-red-500 animate-fade-in";
                        alertItem.innerHTML = `
                            <div class="flex items-center gap-3">
                                <span class="text-xl">🚨</span>
                                <div>
                                    <h4 class="font-bold text-red-800 text-sm">انخفاض حرج في الالتزام</h4>
                                    <p class="text-xs text-red-700 mt-0.5">المريض <span class="font-bold underline">${patient.name || patient.email}</span> التزامه الحالي هو ${adherencePercentage}% فقط.</p>
                                </div>
                            </div>
                            <span class="text-[11px] bg-red-200 text-red-800 px-2 py-1 rounded font-bold">يتطلب متابعة</span>
                        `;
                        alertsContainer.appendChild(alertItem);
                    }
                }

                // بناء كارت المريض بالبيانات المحسوبة الحية
                const name = patient.name || "مريض مسجل";
                const email = patient.email || "لا يوجد بريد";

                const card = document.createElement('div');
                card.className = `bg-white p-6 rounded-2xl border ${cardBorder} shadow-sm flex flex-col justify-between min-h-[190px] text-right transition-all duration-300`;
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <h4 class="font-bold text-lg text-slate-800">${name}</h4>
                            <p class="text-xs text-slate-400 mt-1">${email}</p>
                        </div>
                        ${statusBadge}
                    </div>
                    
                    <div class="space-y-1.5 mt-4">
                        <div class="flex justify-between text-xs font-semibold text-slate-500">
                            <span>معدل الانضباط الخطي</span>
                            <span class="font-bold text-slate-700">${adherencePercentage}%</span>
                        </div>
                        <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                            <div class="${progressColor} h-full rounded-full transition-all duration-500" style="width: ${adherencePercentage}%"></div>
                        </div>
                        <p class="text-[10px] text-slate-400">الجرعات المأخوذة: ${completedMeds} من أصل ${totalMeds}</p>
                    </div>

                    <div class="flex justify-between items-center mt-4 pt-4 border-t border-slate-50">
                        <p class="text-sm font-medium text-slate-500">نسبة الالتزام الكلية: <span class="text-purple-600 font-bold">${adherencePercentage}%</span></p>
                        <div class="flex gap-2">
                            <button data-id="${patient.id}" class="add-med-btn px-3 py-2 bg-purple-50 text-purple-600 text-xs font-bold rounded-xl hover:bg-purple-100 transition">➕ إضافة دواء</button>
                        </div>
                    </div>
                `;
                patientsGrid.appendChild(card);
            });

            // إذا كان كل المرضى ملتزمين
            if (criticalCount === 0 && alertsContainer) {
                alertsContainer.innerHTML = `
                    <div class="text-center py-8 bg-white rounded-2xl border border-slate-100 text-slate-400 text-sm">
                        💚 جميع المرضى التابعين لك ملتزمون بخططهم العلاجية فوق 70% حالياً!
                    </div>
                `;
            }
        }

        // 4. منطق إضافة دواء جديد
        document.addEventListener('click', async (e) => {
            const addBtn = e.target.closest('.add-med-btn'); 
            if (addBtn) {
                const patientId = addBtn.getAttribute('data-id');
                const medName = prompt("أدخل اسم الدواء والجرعة:");
                const medTime = prompt("أدخل الموعد (مثلاً: 9:00 مساءً):");
                
                if (medName && medTime) {
                    try {
                        await addDoc(collection(db, "medications"), {
                            name: medName,
                            time: medTime,
                            patientId: patientId, 
                            status: "pending",     
                            createdAt: new Date()
                        });
                        alert("تم إضافة الدواء بنجاح! سيتم إعادة حساب النسبة تلقائياً 💊");
                    } catch (error) {
                        console.error("خطأ في إضافة الدواء:", error);
                    }
                }
            }
        });

        // 5. منطق التبديل بين التبويبات القائمة الجانبية
        const tabPatients = document.getElementById('tab-patients');
        const tabAlerts = document.getElementById('tab-alerts');
        const sectionPatients = document.getElementById('section-patients');
        const sectionAlerts = document.getElementById('section-alerts');

        function clearActiveTabs() {
            if (tabPatients) tabPatients.className = "flex items-center justify-between px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition w-full text-right";
            if (tabAlerts) tabAlerts.className = "flex items-center justify-between px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition w-full text-right";
            if (sectionPatients) sectionPatients.classList.add('hidden');
            if (sectionAlerts) sectionAlerts.classList.add('hidden');
        }

        if (tabPatients) {
            tabPatients.addEventListener('click', () => {
                clearActiveTabs();
                tabPatients.className = "flex items-center justify-between px-4 py-3 bg-purple-600 text-white font-semibold rounded-xl transition w-full text-right";
                if (sectionPatients) sectionPatients.classList.remove('hidden');
            });
        }

        if (tabAlerts) {
            tabAlerts.addEventListener('click', () => {
                clearActiveTabs();
                tabAlerts.className = "flex items-center justify-between px-4 py-3 bg-purple-600 text-white font-semibold rounded-xl transition w-full text-right";
                if (sectionAlerts) sectionAlerts.classList.remove('hidden');
            });
        }

        // 6. زر تسجيل الخروج بأمان
        const logoutBtn = document.getElementById('logout-btn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', () => {
                signOut(auth).then(() => { window.location.href = 'index.html'; });
            });
        }
    </script>
</body>
</html>
